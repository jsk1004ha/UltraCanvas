<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#ffffff"><title>UltraCanvas</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#fff;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}body{position:fixed;inset:0}#world{position:fixed;inset:0;width:100vw;height:100dvh;display:block;background:#fff;touch-action:none;user-select:none}.hud{position:fixed;z-index:10;left:max(10px,env(safe-area-inset-left));top:max(10px,env(safe-area-inset-top));right:max(10px,env(safe-area-inset-right));display:grid;gap:8px;pointer-events:none}.panel{pointer-events:auto;background:rgba(255,255,255,.92);border:1px solid rgba(17,24,39,.14);box-shadow:0 14px 44px rgba(17,24,39,.12);backdrop-filter:blur(14px);border-radius:16px;padding:10px}.title{display:flex;justify-content:space-between;gap:10px}.title b{font-size:15px}.title span{font-size:12px;color:#6b7280}.modes{display:grid;grid-template-columns:1fr 1fr;gap:8px}.controls{display:flex;flex-wrap:wrap;gap:7px;align-items:end}.controls label{display:grid;gap:2px;font-size:11px;color:#6b7280}button,input{font:inherit}button{height:38px;border-radius:999px;border:1px solid rgba(17,24,39,.14);background:#fff;color:#111827;padding:0 12px;font-weight:700}button.active{background:#111827;color:#fff;border-color:#111827}input[type=text],input[type=number]{height:36px;width:116px;border-radius:999px;border:1px solid rgba(17,24,39,.14);padding:0 11px}input[type=color]{width:40px;height:36px;border:0;background:transparent;padding:0}input[type=range]{width:110px;height:36px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:5px 12px;font-size:12px;color:#6b7280}.stats strong{color:#111827}.ok{color:#16a34a}.bad{color:#dc2626}.help{position:fixed;z-index:9;left:max(10px,env(safe-area-inset-left));right:max(10px,env(safe-area-inset-right));bottom:max(10px,env(safe-area-inset-bottom));background:rgba(255,255,255,.86);border:1px solid rgba(17,24,39,.12);border-radius:14px;padding:8px 10px;font-size:12px;color:#6b7280;pointer-events:none}@media(max-width:640px){.title{display:none}.panel{padding:8px}.controls label span{display:none}input[type=text],input[type=number]{width:82px}input[type=range]{width:76px}button{height:40px;padding:0 9px}.stats{font-size:11px}.help{display:none}}</style></head><body><canvas id="world"></canvas><main class="hud"><section class="panel title"><b>UltraCanvas</b><span>optimized canvas</span></section><section class="panel modes"><button id="drawBtn" class="active">Draw</button><button id="moveBtn">Move</button></section><section class="panel controls"><label><span>Name</span><input id="name" type="text" maxlength="32" placeholder="anonymous"></label><label><span>Color</span><input id="color" type="color" value="#111111"></label><label><span>Width</span><input id="width" type="range" min="2" max="42" value="10"></label><label><span>X</span><input id="goX" type="number" placeholder="x"></label><label><span>Y</span><input id="goY" type="number" placeholder="y"></label><button id="goto">Go</button><button id="spawn">Random</button><button id="copy">Copy</button><button id="reload">Sync</button></section><section class="panel stats"><div>Status <strong id="status">start</strong></div><div>Lines <strong id="count">0</strong></div><div>Pending <strong id="pending">0</strong></div><div>Pos <strong id="pos">-</strong></div><div>Zoom <strong id="zoom">1x</strong></div><div>Chunk <strong id="chunk">-</strong></div></section></main><aside class="help">Pinch uses two fingers. Rendering is batched with requestAnimationFrame.</aside><script src="/app.js?v=9"></script></body></html>
