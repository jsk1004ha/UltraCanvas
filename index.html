<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>UltraCanvas</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#fff;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}body{position:fixed;inset:0}#world{position:fixed;inset:0;width:100vw;height:100dvh;display:block;background:#fff;touch-action:none;user-select:none;cursor:crosshair}.hud{position:fixed;z-index:10;left:max(10px,env(safe-area-inset-left));top:max(10px,env(safe-area-inset-top));right:max(10px,env(safe-area-inset-right));display:grid;gap:8px;pointer-events:none}.panel{pointer-events:auto;background:rgba(255,255,255,.9);border:1px solid rgba(17,24,39,.14);box-shadow:0 14px 44px rgba(17,24,39,.12);backdrop-filter:blur(14px);border-radius:16px;padding:10px}.title{display:flex;justify-content:space-between;gap:10px;align-items:center}.title b{font-size:15px}.title span,.hint{font-size:12px;color:#6b7280}.modes{display:grid;grid-template-columns:1fr 1fr;gap:8px}.controls{display:flex;flex-wrap:wrap;gap:7px;align-items:end}.controls label{display:grid;gap:2px;font-size:11px;color:#6b7280}button,input{font:inherit}button{height:38px;border-radius:999px;border:1px solid rgba(17,24,39,.14);background:#fff;color:#111827;padding:0 12px;font-weight:700}button.active{background:#111827;color:#fff;border-color:#111827}input[type=text]{height:36px;width:116px;border-radius:999px;border:1px solid rgba(17,24,39,.14);padding:0 11px}input[type=color]{width:40px;height:36px;border:0;background:transparent;padding:0}input[type=range]{width:110px;height:36px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:5px 12px;font-size:12px;color:#6b7280}.stats strong{color:#111827}.mobilehelp{position:fixed;z-index:9;left:max(10px,env(safe-area-inset-left));right:max(10px,env(safe-area-inset-right));bottom:max(10px,env(safe-area-inset-bottom));background:rgba(255,255,255,.86);border:1px solid rgba(17,24,39,.12);border-radius:14px;padding:8px 10px;font-size:12px;color:#6b7280;pointer-events:none}@media(max-width:640px){.title{display:none}.panel{padding:8px;border-radius:14px}.controls{gap:5px}.controls label span{display:none}input[type=text]{width:94px}input[type=range]{width:88px}button{height:40px;padding:0 10px}.stats{font-size:11px}.mobilehelp{display:none}}
  </style>
</head>
<body>
  <canvas id="world"></canvas>
  <main class="hud">
    <section class="panel title"><b>UltraCanvas</b><span>1,000,000,000 × 1,000,000,000 px</span></section>
    <section class="panel modes"><button id="drawBtn" class="active" type="button">✏️ 그리기</button><button id="moveBtn" type="button">✋ 이동</button></section>
    <section class="panel controls">
      <label><span>이름</span><input id="name" type="text" maxlength="32" placeholder="anonymous" /></label>
      <label><span>색</span><input id="color" type="color" value="#111111" /></label>
      <label><span>두께</span><input id="width" type="range" min="2" max="42" value="10" /></label>
      <button id="spawn" type="button">랜덤</button>
      <button id="copy" type="button">좌표</button>
      <button id="reload" type="button">새로고침</button>
    </section>
    <section class="panel stats"><div>상태 <strong id="status">start</strong></div><div>선 <strong id="count">0</strong></div><div>좌표 <strong id="pos">-</strong></div><div>줌 <strong id="zoom">1x</strong></div></section>
  </main>
  <aside class="mobilehelp">그리기 모드에서 드래그하면 즉시 선이 보입니다. 이동은 ✋ 이동 모드를 누르세요.</aside>
<script>
(function(){
  'use strict';
  var API='https://nqzffgrwsbuxwrfbunbs.supabase.co/functions/v1/canvas-api';
  var WORLD=1000000000, CHUNK=512;
  var canvas=document.getElementById('world');
  var ctx=canvas.getContext('2d',{alpha:false});
  var el=function(id){return document.getElementById(id)};
  var mem={};
  function safeGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:v}catch(e){return mem[k]||d}}
  function safeSet(k,v){try{localStorage.setItem(k,String(v))}catch(e){mem[k]=String(v)}}
  function uuid(){if(crypto&&crypto.randomUUID)return crypto.randomUUID();return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0,v=c==='x'?r:(r&3|8);return v.toString(16)})}
  var state={
    dpr:1, zoom:Number(safeGet('uc.zoom','1'))||1,
    x:Number(safeGet('uc.x',String(Math.floor(Math.random()*WORLD))))||0,
    y:Number(safeGet('uc.y',String(Math.floor(Math.random()*WORLD))))||0,
    mode:safeGet('uc.mode','draw'), strokes:new Map(), active:[], down:false, pan:false, pid:null, last:null,
    session:safeGet('uc.session',uuid()), seq:0, loading:false, lastKey:''
  };
  safeSet('uc.session',state.session);
  function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
  function setStatus(t){el('status').textContent=t}
  function updateCount(){el('count').textContent=String(state.strokes.size)}
  function resize(){state.dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));canvas.width=Math.floor(innerWidth*state.dpr);canvas.height=Math.floor(innerHeight*state.dpr);draw()}
  function s2w(px,py){return {x:Math.round(state.x+(px-innerWidth/2)/state.zoom),y:Math.round(state.y+(py-innerHeight/2)/state.zoom)}}
  function w2s(wx,wy){return {x:(wx-state.x)*state.zoom+innerWidth/2,y:(wy-state.y)*state.zoom+innerHeight/2}}
  function view(){var a=s2w(0,0),b=s2w(innerWidth,innerHeight);var minX=clamp(Math.min(a.x,b.x),0,WORLD),minY=clamp(Math.min(a.y,b.y),0,WORLD),maxX=clamp(Math.max(a.x,b.x),0,WORLD),maxY=clamp(Math.max(a.y,b.y),0,WORLD);return{minCx:Math.floor(minX/CHUNK),minCy:Math.floor(minY/CHUNK),maxCx:Math.floor(maxX/CHUNK),maxCy:Math.floor(maxY/CHUNK)}}
  function drawGrid(){var step=CHUNK*state.zoom;if(step<28)return;var a=s2w(0,0),b=s2w(innerWidth,innerHeight);var sx=Math.floor(a.x/CHUNK)*CHUNK,sy=Math.floor(a.y/CHUNK)*CHUNK;ctx.save();ctx.scale(state.dpr,state.dpr);ctx.strokeStyle='rgba(17,24,39,.06)';ctx.lineWidth=1;for(var x=sx;x<=b.x;x+=CHUNK){var px=w2s(x,0).x;ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,innerHeight);ctx.stroke()}for(var y=sy;y<=b.y;y+=CHUNK){var py=w2s(0,y).y;ctx.beginPath();ctx.moveTo(0,py);ctx.lineTo(innerWidth,py);ctx.stroke()}ctx.restore()}
  function drawStroke(st,preview){var pts=Array.isArray(st)?st:st.points;if(!pts||!pts.length)return;ctx.save();ctx.scale(state.dpr,state.dpr);ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle=preview?el('color').value:(st.color||'#111111');ctx.lineWidth=Math.max(3,Number(preview?el('width').value:st.width||10)*state.zoom);if(pts.length===1){var q=w2s(pts[0].x,pts[0].y);ctx.fillStyle=ctx.strokeStyle;ctx.beginPath();ctx.arc(q.x,q.y,ctx.lineWidth/2,0,Math.PI*2);ctx.fill();ctx.restore();return}var p=w2s(pts[0].x,pts[0].y);ctx.beginPath();ctx.moveTo(p.x,p.y);for(var i=1;i<pts.length;i++){p=w2s(pts[i].x,pts[i].y);ctx.lineTo(p.x,p.y)}ctx.stroke();ctx.restore()}
  function draw(){state.x=clamp(state.x,0,WORLD);state.y=clamp(state.y,0,WORLD);ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);drawGrid();state.strokes.forEach(function(st){drawStroke(st,false)});if(state.active.length)drawStroke(state.active,true);el('pos').textContent=Math.round(state.x).toLocaleString()+','+Math.round(state.y).toLocaleString();el('zoom').textContent=state.zoom.toFixed(2)+'x';safeSet('uc.x',Math.round(state.x));safeSet('uc.y',Math.round(state.y));safeSet('uc.zoom',state.zoom)}
  function simple(pts){var out=[],last=null,dist=Math.max(1,2/state.zoom);for(var i=0;i<pts.length;i++){var p=pts[i];if(!last||Math.hypot(p.x-last.x,p.y-last.y)>=dist){out.push(p);last=p}}if(out.length===1)out.push({x:out[0].x+1,y:out[0].y+1});return out.slice(0,1024)}
  function localStroke(pts){var spts=simple(pts);if(spts.length<2)return null;return{id:'local-'+(++state.seq),session_id:state.session,user_name:(el('name').value||'anonymous').slice(0,32),color:el('color').value,width:Number(el('width').value)||10,points:spts,created_at:new Date().toISOString(),local:true}}
  async function save(st){try{var res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:state.session,userName:st.user_name,color:st.color,width:st.width,points:st.points})});if(!res.ok)throw new Error(await res.text());var data=await res.json();state.strokes.delete(st.id);st.id=data.stroke.id;st.created_at=data.stroke.created_at;st.local=false;state.strokes.set(st.id,st);updateCount();setStatus('saved');draw()}catch(e){console.error(e);setStatus('local only')}}
  async function load(force){if(state.loading)return;var v=view(),key=v.minCx+','+v.minCy+','+v.maxCx+','+v.maxCy;if(!force&&key===state.lastKey)return;state.loading=true;state.lastKey=key;try{var res=await fetch(API+'?'+new URLSearchParams(v).toString(),{cache:'no-store'});if(!res.ok)throw new Error(await res.text());var data=await res.json();(data.strokes||[]).forEach(function(st){state.strokes.set(st.id,st)});updateCount();setStatus('online');draw()}catch(e){console.error(e);setStatus('api error')}finally{state.loading=false}}
  function setMode(m){state.mode=m;safeSet('uc.mode',m);el('drawBtn').classList.toggle('active',m==='draw');el('moveBtn').classList.toggle('active',m==='move');canvas.style.cursor=m==='draw'?'crosshair':'grab';setStatus(m)}
  function start(ev){ev.preventDefault();state.pid=ev.pointerId;try{canvas.setPointerCapture(ev.pointerId)}catch(e){}state.last={x:ev.clientX,y:ev.clientY};state.pan=state.mode==='move'||ev.shiftKey||ev.altKey;state.down=!state.pan;if(state.down){state.active=[s2w(ev.clientX,ev.clientY)];draw()}}
  function move(ev){if(state.pid!==null&&ev.pointerId!==state.pid)return;if(!state.last)return;ev.preventDefault();if(state.pan){state.x-=(ev.clientX-state.last.x)/state.zoom;state.y-=(ev.clientY-state.last.y)/state.zoom;state.last={x:ev.clientX,y:ev.clientY};draw();load(false);return}if(state.down){state.active.push(s2w(ev.clientX,ev.clientY));draw()}}
  function end(ev){if(state.pid!==null&&ev.pointerId!==state.pid)return;ev.preventDefault();if(state.down){var st=localStroke(state.active);state.active=[];if(st){state.strokes.set(st.id,st);updateCount();setStatus('visible');draw();save(st)}}state.down=false;state.pan=false;state.pid=null;state.last=null;state.active=[];draw();load(true)}
  canvas.addEventListener('pointerdown',start,{passive:false});canvas.addEventListener('pointermove',move,{passive:false});canvas.addEventListener('pointerup',end,{passive:false});canvas.addEventListener('pointercancel',end,{passive:false});
  canvas.addEventListener('wheel',function(ev){ev.preventDefault();var before=s2w(ev.clientX,ev.clientY);state.zoom=clamp(state.zoom*(ev.deltaY<0?1.12:.89),.05,12);var after=s2w(ev.clientX,ev.clientY);state.x+=before.x-after.x;state.y+=before.y-after.y;draw();load(false)},{passive:false});
  el('drawBtn').onclick=function(){setMode('draw')};el('moveBtn').onclick=function(){setMode('move')};el('spawn').onclick=function(){state.x=Math.floor(Math.random()*WORLD);state.y=Math.floor(Math.random()*WORLD);state.strokes.clear();state.lastKey='';updateCount();draw();load(true)};el('reload').onclick=function(){state.strokes.clear();state.lastKey='';updateCount();draw();load(true)};el('copy').onclick=function(){var text=Math.round(state.x)+','+Math.round(state.y);navigator.clipboard&&navigator.clipboard.writeText(text);setStatus('copied')};
  window.addEventListener('resize',resize);window.addEventListener('orientationchange',function(){setTimeout(resize,250)});window.addEventListener('keydown',function(ev){var sp=340/state.zoom;if(ev.key==='ArrowUp')state.y-=sp;if(ev.key==='ArrowDown')state.y+=sp;if(ev.key==='ArrowLeft')state.x-=sp;if(ev.key==='ArrowRight')state.x+=sp;if(ev.key.toLowerCase()==='d')setMode('draw');if(ev.key.toLowerCase()==='m')setMode('move');draw();load(false)});
  setMode(state.mode==='move'?'move':'draw');resize();setStatus('ready');load(true);setInterval(function(){load(true)},2200);
})();
</script>
</body>
</html>
